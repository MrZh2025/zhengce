<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医疗器械政策追踪平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0c1426 0%, #1a2a4a 50%, #0f2027 100%);
      min-height: 100vh;
      color: #e0e6ed;
    }
    .header {
      text-align: center;
      padding: 60px 20px 30px;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .header p {
      font-size: 15px;
      color: #94a3b8;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      margin-top: 16px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(96,165,250,0.15);
      color: #60a5fa;
      border: 1px solid rgba(96,165,250,0.3);
    }
    .cards {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 40px 20px;
      flex-wrap: wrap;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 32px 28px;
      width: 380px;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .card-regulation::before { background: linear-gradient(90deg, #3b82f6, #6366f1); }
    .card-registration::before { background: linear-gradient(90deg, #10b981, #06b6d4); }
    .card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .card-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
    }
    .card-regulation .card-icon { background: rgba(59,130,246,0.15); }
    .card-registration .card-icon { background: rgba(16,185,129,0.15); }
    .card h2 {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 10px;
    }
    .card .desc {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .card .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #64748b;
    }
    .card .meta .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
    }
    .card .arrow {
      position: absolute;
      right: 24px;
      bottom: 28px;
      font-size: 18px;
      color: #475569;
      transition: all 0.3s;
    }
    .card:hover .arrow {
      color: #60a5fa;
      transform: translateX(4px);
    }
    .footer {
      text-align: center;
      padding: 40px 20px 60px;
      font-size: 12px;
      color: #475569;
    }
    .footer a { color: #64748b; text-decoration: none; }
    .footer a:hover { color: #94a3b8; }
    @media (max-width: 600px) {
      .header h1 { font-size: 24px; }
      .cards { padding: 20px 16px; }
      .card { width: 100%; padding: 24px 20px; }
    }
  </style>
</head>

    <p>四川省医疗器械生产检查员专属工具，自动追踪法规动态，覆盖核药、脑机接口、医疗机器人、AI制药四大前沿领域</p>
    <span class="badge">自动化周报 &middot; AI驱动分析</span>
  </div>

      </div>
      <div class="meta">

      </div>

    </a>
  </div>

  <div class="footer">
    <p>&copy; 2026 医疗器械政策追踪平台 &middot; <a href="https://github.com/MrZh2025/zhengce">GitHub</a></p>
